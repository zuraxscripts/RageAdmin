<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RageAdmin Notices</title>
    <style>
        :root {
            --bg-soft: rgba(26, 26, 31, 0.92);
            --text: #f3f4f6;
            --muted: #a8adb7;
            --gold: #d4af4a;
            --red: #ef4444;
            --yellow: #f59e0b;
            --blue: #60a5fa;
            --shadow: 0 22px 55px rgba(0, 0, 0, 0.38);
            --ease: cubic-bezier(.2,.8,.2,1);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
            color: var(--text);
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        .notice-layer {
            position: fixed;
            inset: 0;
        }

        .notice-stack {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: min(760px, calc(100vw - 60px));
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
        }

        .notice {
            position: relative;
            overflow: hidden;
            padding: 16px 18px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.08);
            background:
                linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.015)),
                radial-gradient(420px 130px at 0% 0%, rgba(212,175,74,0.13), transparent 64%),
                var(--bg-soft);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            animation: noticeIn 260ms var(--ease);
        }

        .notice.leaving {
            animation: noticeOut 200ms ease-in forwards;
        }

        .notice::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 4px;
            transform-origin: left center;
            animation: shrink linear forwards;
            animation-duration: var(--duration, 5s);
            background: rgba(255,255,255,0.45);
        }

        .notice.message::after { background: rgba(96,165,250,0.94); }
        .notice.announce::after { background: rgba(212,175,74,0.94); }
        .notice.warn::after { background: rgba(245,158,11,0.94); }
        .notice.restart::after { background: rgba(239,68,68,0.94); }

        .notice-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 8px;
        }

        .notice-kind {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .notice-kind-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: currentColor;
            box-shadow: 0 0 0 6px rgba(255,255,255,0.06);
        }

        .notice.message .notice-kind { color: var(--blue); }
        .notice.announce .notice-kind { color: var(--gold); }
        .notice.warn .notice-kind { color: var(--yellow); }
        .notice.restart .notice-kind { color: var(--red); }

        .notice-title {
            font-size: 22px;
            font-weight: 750;
            line-height: 1.15;
        }

        .notice-duration {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
        }

        .notice-message {
            font-size: 15px;
            line-height: 1.45;
            color: #eef2f6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        @keyframes noticeIn {
            from { opacity: 0; transform: translateY(-12px) scale(0.97); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes noticeOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-10px) scale(0.98); }
        }

        @keyframes shrink {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        @media (max-width: 900px) {
            .notice-stack {
                top: 16px;
                width: min(680px, calc(100vw - 34px));
            }

            .notice {
                border-radius: 16px;
                padding: 14px 15px 16px;
            }

            .notice-title {
                font-size: 19px;
            }

            .notice-message {
                font-size: 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="notice-layer">
        <section class="notice-stack" id="noticeStack"></section>
    </div>

    <script>
        function parsePayload(raw, fallback = {}) {
            try {
                if (typeof raw === 'string') {
                    return JSON.parse(raw);
                }
                if (raw && typeof raw === 'object') {
                    return raw;
                }
            } catch (err) {}
            return fallback;
        }

        function normalizeText(value, fallback) {
            const text = String(value == null ? fallback : value).trim();
            return text || fallback || '';
        }

        function computeNoticeDuration(message, requested, minimum, maximum) {
            const text = normalizeText(message, '');
            const min = Number.isFinite(Number(minimum)) ? Number(minimum) : 10;
            const max = Number.isFinite(Number(maximum)) ? Number(maximum) : 45;
            const lines = Math.max(1, text.split(/\r?\n/).length);
            const estimated = 6 + Math.ceil(text.length / 22) + Math.max(0, lines - 1) * 2;
            const requestedSeconds = Number(requested || 0);
            const seconds = Math.max(min, estimated, Number.isFinite(requestedSeconds) ? requestedSeconds : min);
            return Math.max(min, Math.min(max, seconds));
        }

        function noticeKindLabel(variant) {
            const v = normalizeText(variant, 'message').toLowerCase();
            if (v === 'announce') return 'SERVER ANNOUNCEMENT';
            if (v === 'warn') return 'WARNING';
            if (v === 'restart') return 'RESTART NOTICE';
            return 'DIRECT MESSAGE';
        }

        function removeNotice(node) {
            if (!node || !node.parentNode) {
                return;
            }
            node.classList.add('leaving');
            window.setTimeout(() => {
                if (node.parentNode) {
                    node.parentNode.removeChild(node);
                }
            }, 190);
        }

        function pushNotice(rawPayload) {
            const payload = parsePayload(rawPayload, {});
            const variant = normalizeText(payload.variant, 'message').toLowerCase();
            const message = normalizeText(payload.message, '');
            const duration = computeNoticeDuration(message, payload.duration, 10, 45);
            const title = normalizeText(payload.title, variant === 'announce' ? 'Server Announcement' : 'RageAdmin');
            if (!message) return;

            const wrap = document.createElement('article');
            wrap.className = `notice ${variant}`;
            wrap.style.setProperty('--duration', `${duration}s`);
            wrap.innerHTML = `
                <div class="notice-head">
                    <div>
                        <div class="notice-kind"><span class="notice-kind-dot"></span>${noticeKindLabel(variant)}</div>
                        <div class="notice-title">${title}</div>
                    </div>
                    <div class="notice-duration">${duration}s</div>
                </div>
                <div class="notice-message"></div>
            `;
            wrap.querySelector('.notice-message').textContent = message;

            const stack = document.getElementById('noticeStack');
            stack.appendChild(wrap);

            window.setTimeout(() => removeNotice(wrap), duration * 1000 + 200);
        }

        if (window.mp && mp.events && typeof mp.events.add === 'function') {
            mp.events.add('rageadminPushNotice', pushNotice);
        }
    </script>
</body>
</html>
