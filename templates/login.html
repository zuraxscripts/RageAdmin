<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login_page_title">Login - RageAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0c;
            --bg2: #111113;
            --bg3: #151518;
            --border: #1f1f23;
            --text: #e9e9ee;
            --muted: #a0a0aa;
            --primary: #c6a13a;
            --primary-hover: #b48f31;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: radial-gradient(1200px 800px at 20% -10%, rgba(198,161,58,.18), transparent 60%),
                        radial-gradient(1200px 800px at 100% 0%, rgba(124,104,35,.12), transparent 55%),
                        var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: clamp(1rem, 4vh, 3rem) 1rem;
            overflow-x: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeUp 0.4s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: clamp(0.875rem, 2vh, 1.5rem);
        }

        .logo img {
            width: clamp(96px, 16vw, 144px);
            max-height: min(16vh, 144px);
            height: auto;
            display: inline-block;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: .2px;
        }

        .logo p {
            color: var(--muted);
            font-size: 0.8125rem;
            margin-top: 0.25rem;
        }

        .card {
            background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: clamp(1.25rem, 2vw, 2rem);
            box-shadow: 0 10px 30px rgba(0,0,0,.35);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: #ffffff;
        }

        .card-subtitle {
            color: #c8c8d0;
            margin-bottom: 1.5rem;
            font-size: 0.8125rem;
        }

        .form-group { margin-bottom: 1.25rem; }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 650;
            margin-bottom: 0.375rem;
            color: var(--muted);
        }

        .form-label i {
            width: 1rem;
            margin-right: 0.25rem;
            opacity: 0.6;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0,0,0,.25);
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.8125rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .form-input::placeholder { color: rgba(255,255,255,.2); }

        .form-input:focus {
            border-color: rgba(198,161,58,.45);
            background: rgba(0,0,0,.30);
        }

        .btn-submit {
            width: 100%;
            padding: 10px 1.25rem;
            background: rgba(198,161,58,.16);
            border: 1px solid rgba(198,161,58,.34);
            color: var(--text);
            border-radius: 14px;
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 650;
            cursor: pointer;
            transition: background 0.2s, transform 0.12s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover { background: rgba(198,161,58,.24); transform: translateY(-1px); }
        .btn-submit:active { transform: translateY(0) scale(.99); }
        .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        .alert {
            padding: 10px 12px;
            border-radius: 14px;
            margin-bottom: 1.25rem;
            font-size: 0.8125rem;
            background: rgba(239,68,68,.08);
            border: 1px solid rgba(239,68,68,.2);
            color: #fca5a5;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input[type="checkbox"] {
            width: 0.9375rem;
            height: 0.9375rem;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-group label {
            font-size: 0.8125rem;
            color: var(--muted);
            cursor: pointer;
        }

        @media (max-width: 520px) {
            .card { padding: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="/logo.png" alt="RageAdmin">
            <h1 data-i18n="brand_name">RageAdmin</h1>
            <p data-i18n="brand_tagline">Admin panel for GTA V RageMP servers</p>
        </div>

        <div class="card">
            <h2 class="card-title" data-i18n="login_title">Sign In</h2>
            <p class="card-subtitle" data-i18n="login_subtitle">Enter your credentials to access the panel</p>

            <div id="alert" style="display: none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label"><i class="fa-solid fa-user"></i> <span data-i18n="login_username">Username</span></label>
                    <input type="text" class="form-input" id="username" placeholder="Enter your username" data-i18n-placeholder="login_username_placeholder" required autocomplete="username" autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label"><i class="fa-solid fa-lock"></i> <span data-i18n="login_password">Password</span></label>
                    <input type="password" class="form-input" id="password" placeholder="Enter your password" data-i18n-placeholder="login_password_placeholder" required autocomplete="current-password">
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember" checked>
                        <label for="remember"><span data-i18n="login_remember">Remember me</span></label>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fa-solid fa-right-to-bracket"></i> <span data-i18n="login_submit">Sign In</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        let locale = {};
        const form = document.getElementById('loginForm');
        const alertEl = document.getElementById('alert');
        const submitBtn = document.getElementById('submitBtn');

        function t(key, fallback) {
            return locale[key] || fallback || key;
        }

        async function loadLocale() {
            try {
                const res = await fetch('/api/locales/en');
                if (res.ok) locale = await res.json();
            } catch (e) {}
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (locale[key]) el.textContent = locale[key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (locale[key]) el.setAttribute('placeholder', locale[key]);
            });
        }

        loadLocale();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) { showAlert(t('login_fill_fields', 'Please fill in all fields')); return; }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> ${t('login_signing_in', 'Signing in...')}`;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    if (data.force_password_change) {
                        window.location.href = '/change-password';
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    showAlert(data.message || t('login_invalid', 'Invalid credentials'));
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> ${t('login_submit', 'Sign In')}`;
                }
            } catch (error) {
                showAlert(t('login_error', 'An error occurred. Please try again.'));
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> ${t('login_submit', 'Sign In')}`;
            }
        });

        function showAlert(message) {
            alertEl.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${message}`;
            alertEl.style.display = 'flex';
        }

        document.getElementById('username').focus();
    </script>
</body>
</html>
